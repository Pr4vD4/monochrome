<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Document</title>
</head>
<body>
<div class="wrapper">

    <div class="header">
        <div class="header-section w100 d-flex justify-content-center">
            <div class="header-title container d-flex justify-content-between">
                <div class="icon d-flex align-items-center">
                    <img src="/assets/img/globe.svg" alt="">
                    <span class="active-language">RU</span>
                    <span class="inactive-language">EN</span>
                </div>
                <div class="header-title-brand">
                    MONOCHROME
                </div>
                <div class="icon d-flex align-items-center">
                    <img src="/assets/img/search.png">
                    <img src="/assets/img/user.png">
                    <img src="/assets/img/cart.png">
                </div>
            </div>
        </div>
        <div class="header-section w100 d-flex justify-content-center">
            <div class="header-title w50 d-flex justify-content-between">
                <div class="">
                    ЖЕНЩИНАМ
                </div>
                <div class="">
                    МУЖЧИНАМ
                </div>
                <div class="">
                    ДЕТЯМ
                </div>
                <div class="">
                    АКЦИИ
                </div>
                <div class="">
                    КОНТАКТЫ
                </div>
            </div>
        </div>
    </div>

    <main>

    </main>

    <div class="footer d-flex justify-content-center">
        <div class="footer-contact container">
            <div class="title w100 d-flex flex-column">
                <div class="d-flex">ПОДПИШИТЕСЬ</div>
                <div class="d-flex row-reverse">НА НАШУ РАССЫЛКУ</div>
            </div>
            <div class="contact d-flex justify-content-between">
                <div class="contact-form-info w45 d-flex flex-column justify-content-between">
                    <div class="contact-form-info-text">
                        Никакого спама. Только полезные статьи от наших
                        стилистов и промокоды на скидку. Вы можете сами
                        выбрать тип рассылки и получать только те письма,
                        которые вам интересны.
                    </div>
                    <div class="contact-form-info-image">
                        <img src="/assets/img/13.jpg">
                    </div>
                </div>
                <div class="contact-form w45 d-flex flex-column">
                    <label class="" for="name">Имя</label>
                    <input class="mt1" type="text" id="name" placeholder="Введите ваше имя">

                    <label class="mt2" for="phone">Телефон</label>
                    <input class="mt1" type="text" id="phone" placeholder="+7 ___ ___ __ __">

                    <label class="mt2" for="email">E-mail</label>
                    <input class="mt1" type="text" id="email" placeholder="Введите вашу почту">

                    <label class="mt3">Выберите тип рассылки</label>
                    <div class="radios d-flex mt1 ">
                        <input type="radio" id="1">
                        <label for="1">Советы от стилистов</label>
                        <input type="radio" id="2">
                        <label for="2">Промокоды на скидку</label>
                        <input type="radio" id="3">
                        <label for="3">Новости</label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


</body>
</html>
